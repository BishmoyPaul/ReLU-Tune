model_id: "meta-llama/Llama-3.2-1B"
output_root: "./runs"
run_name: "llama32_1b_relu_debug"
seed: 42

activation:
  type: "relu"
  layer_mode: "all"
  # Example partial ReLU-fication:
  # layer_mode: "partial"
  # layer_indices: [0, 1, 2, 3]

training:
  # Small staged run for learning the end-to-end workflow.
  total_steps: 90
  stage_size: 30
  batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 1.0e-4
  warmup_steps: 5
  weight_decay: 0.01
  logging_steps: 5
  save_steps: 30
  save_total_limit: 1
  gradient_checkpointing: true
  bf16: true
  optimizer: "adamw_torch_fused"
  lr_scheduler_type: "linear"
  torch_compile: false

lora:
  r: 64
  alpha: 16
  dropout: 0.05
  include_mlp: true
  include_attention: true

logging:
  wandb:
    enabled: false
    project: "relu-tune"
    entity: null
    group: null

measure_sparsity:
  enabled: false
  num_samples: 16
  batch_size: 4
  threshold: 0.0
  dataset: "allenai/c4"
  dataset_config: "en"
  dataset_split: "train"
  text_column: "text"

data:
  name: "tiiuae/falcon-refinedweb"
  split: "train"
  revision: "c735840"
  cache_root: "./data_cache"
  block_size: 1024
  train_docs: 4000

validation:
  enabled: true
  docs: 256
  skip_docs: 5000
  eval_steps: 30
  batch_size: 4
